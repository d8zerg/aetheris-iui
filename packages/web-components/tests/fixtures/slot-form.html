<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>aui-slot-form fixture</title>
  <script type="module" src="/src/aui-slot-form.ts"></script>
</head>
<body>
  <aui-slot-form id="form"></aui-slot-form>

  <script>
    window.__events = { slotChanges: [], submits: 0 };
    const form = document.getElementById('form');
    form.addEventListener('aui:slot-change', (e) => {
      window.__events.slotChanges.push(e.detail);
    });
    form.addEventListener('aui:submit', () => { window.__events.submits++; });
  </script>
</body>
</html>
